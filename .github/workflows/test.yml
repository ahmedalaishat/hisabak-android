name: Unit tests

on:
  # PRs only: branch protection routes every change through a PR, so the pull_request run is
  # the single gate. (Running on push too would re-test the same commit after merge.)
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Run unit tests
        run: ./gradlew testProdDebugUnitTest --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-report
          path: app/build/reports/tests/testProdDebugUnitTest
          if-no-files-found: ignore
