name: Release to Play (internal)

# On a v* release tag: build a signed prod AAB + APK, publish the AAB to the Google Play
# internal track, and attach the APK to a GitHub Release for direct download.
# Promotion internal → production stays a manual step in the Play Console.
on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Prod → Play internal + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed prod AAB + APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleProdRelease assembleProdRelease --no-daemon -PrequireReleaseSigning
          cp app/build/outputs/apk/prod/release/app-prod-release.apk "hisabak-${{ github.ref_name }}.apk"

      - name: Generate Play release notes from CHANGELOG
        run: ./scripts/changelog-to-whatsnew.sh

      - name: Publish to Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hisabak
          releaseFiles: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          tracks: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release with the prod APK
        uses: softprops/action-gh-release@v3
        with:
          files: hisabak-${{ github.ref_name }}.apk
          generate_release_notes: true
