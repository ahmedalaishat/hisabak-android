<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; background: var(--bg); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .spec { width: 150px; flex: none; font: 400 11px/1.3 var(--font-mono); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><div class="spec">Row · 16 / 500</div><div class="t-row">Carrefour Hypermarket</div></div>
    <div class="line"><div class="spec">Body · 16 / 400</div><div class="t-body">Track where your money goes.</div></div>
    <div class="line"><div class="spec">Label · 14 / 500</div><div class="t-label">This Month</div></div>
    <div class="line"><div class="spec">Caption · 13 / 400</div><div class="t-caption" style="color:var(--text-secondary)">Yesterday · 14:32</div></div>
    <div class="line"><div class="spec">Overline · 11 / 600</div><div class="t-overline" style="color:var(--text-tertiary)">Income by Category</div></div>
  </div>
</body>
</html>
