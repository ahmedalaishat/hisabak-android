<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, SearchBar, SegmentedControl } = window.HisabakDesignSystem_aa2548;
function Demo() {
  const [type, setType] = React.useState('expense');
  const [period, setPeriod] = React.useState('month');
  return (
    <div className="grid">
      <Input label="Brand name" value="Carrefour" leadingIcon="storefront" />
      <Input label="Amount" value="342.75" leadingIcon="payments" helper="AED" />
      <Input label="Category name" error="Name is required" value="" placeholder="e.g. Groceries" />
      <Input label="Note" multiline placeholder="Add a note…" rows={2} />
      <div style={{gridColumn:'1 / -1'}}><SearchBar value="" /></div>
      <div style={{gridColumn:'1 / -1'}}>
        <SegmentedControl value={type} onChange={setType} options={[
          {value:'expense', label:'Expense', tone:'expense'},
          {value:'income', label:'Income', tone:'income'},
          {value:'savings', label:'Savings', tone:'savings'},
          {value:'investment', label:'Invest', tone:'investment'},
        ]} />
      </div>
      <div style={{gridColumn:'1 / -1', maxWidth:320}}>
        <SegmentedControl value={period} onChange={setPeriod} options={[
          {value:'week', label:'Week'}, {value:'month', label:'Month'},
          {value:'year', label:'Year'}, {value:'all', label:'All'},
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
