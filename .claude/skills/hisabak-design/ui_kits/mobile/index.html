<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hisabak — Mobile UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="mock.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #1A1D24; display: grid; place-items: center; min-height: 100vh; font-family: var(--font-sans); padding: 24px 0; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .toolbar { display: inline-flex; align-items: center; gap: 4px; padding: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; flex-wrap: wrap; justify-content: center; max-width: 412px; }
  .toolbar button { border: none; background: transparent; color: rgba(255,255,255,0.7); font-family: var(--font-sans); font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 999px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .toolbar button.on { background: #fff; color: #111827; }
  .toolbar .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.16); margin: 0 2px; }
  .phone {
    width: 412px; height: 844px; position: relative;
    background: var(--bg); border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 11px #0c0e12, 0 0 0 13px #2a2e38, 0 30px 70px rgba(0,0,0,0.55);
  }
  .app { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .statusbar { height: 30px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--text-primary); background: var(--nav-bg); }
  .statusbar .icons { display: flex; align-items: center; gap: 6px; }
  .statusbar .material-symbols-rounded { font-size: 16px; }
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; position: relative; }
  .scroll::-webkit-scrollbar { width: 0; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; height: 0; }
  .fab { position: absolute; right: 18px; bottom: 84px; width: 56px; height: 56px; border-radius: 18px; border: none; background: var(--accent); color: #fff; display: grid; place-items: center; cursor: pointer; box-shadow: var(--shadow-accent); z-index: 20; transition: transform var(--dur-fast); }
  .fab:active { transform: scale(0.94); }
  .fab .material-symbols-rounded { font-size: 28px; }
  .bell-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 999px; background: var(--expense); border: 2px solid var(--nav-bg); }
  @keyframes sync-spin { to { transform: rotate(360deg); } }
  @keyframes sync-pulse { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(1.15); opacity: 0; } }
  .sync-spin { animation: sync-spin 1.1s linear infinite; }
  .sync-pulse { animation: sync-pulse 1.8s ease-out infinite; }
  @media (prefers-reduced-motion: reduce) { .sync-spin, .sync-pulse { animation: none; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- All app screens are precompiled into mobile-kit.compiled.js (a plain, non-Babel script generated
     from the *.jsx sources) so index.html works even when opened over file://, where the browser
     blocks Babel from fetching sibling .jsx. The compiled screens override the stale copies baked into
     _ds_bundle.js (which still uses the text "AED" instead of the dirham glyph). Rebuild the compiled
     file after editing any *.jsx — see README → "Rebuilding". -->
<script src="mobile-kit.compiled.js"></script>
<!-- Hugeicons (free, MIT) glyph data + runtime swap layer: converts every rendered Material Symbol
     into its Hugeicons SVG when enabled (toggle in the toolbar). Mock-only, no per-screen edits. -->
<script src="hugeicons-glyphs.js"></script>
<script>
(function () {
  const SVGNS = 'http://www.w3.org/2000/svg';
  let on = false, obs = null;
  function swap(span) {
    if (span.dataset.hgi === '1') return;
    const name = (span.textContent || '').trim();
    const paths = (window.HGI || {})[name];
    if (!paths) return;                 // unmapped → leave the Material glyph
    span.dataset.hgi = '1'; span.dataset.hgiText = name; span.textContent = '';
    const svg = document.createElementNS(SVGNS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('width', '1em'); svg.setAttribute('height', '1em');
    svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.8'); svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
    svg.style.verticalAlign = '-0.125em';
    paths.forEach(d => { const p = document.createElementNS(SVGNS, 'path'); p.setAttribute('d', d); svg.appendChild(p); });
    span.appendChild(svg);
  }
  function restore(span) {
    if (span.dataset.hgi !== '1') return;
    span.textContent = span.dataset.hgiText || ''; delete span.dataset.hgi;
  }
  const swapAll = () => document.querySelectorAll('.material-symbols-rounded:not([data-hgi="1"])').forEach(swap);
  const restoreAll = () => document.querySelectorAll('.material-symbols-rounded[data-hgi="1"]').forEach(restore);
  window.IconSwap = {
    enable() {
      on = true; swapAll();
      if (!obs) { obs = new MutationObserver(() => { if (on) swapAll(); }); obs.observe(document.body, { childList: true, subtree: true }); }
    },
    disable() { on = false; restoreAll(); },
  };
})();
</script>

<script type="text/babel" data-presets="react">
const NS = window.HisabakDesignSystem_aa2548;
const { TopAppBar, BottomNav } = NS;

// Real app IA: 5 tabs — Dashboard, Transactions, SMS, Manage, Settings.
const TABS = [
  { value: 'dashboard',    label: 'Dashboard',    icon: 'dashboard' },
  { value: 'transactions', label: 'Transactions', icon: 'receipt_long' },
  { value: 'sms',          label: 'SMS',          icon: 'sms' },
  { value: 'manage',       label: 'Manage',       icon: 'category' },
  { value: 'settings',     label: 'Settings',     icon: 'settings' },
];
const OVERLAY_TITLES = { backup: 'Backup & restore', notifications: 'Notifications', brandEdit: 'Edit brand', categoryEdit: 'Edit category' };

function StatusBar() {
  return (
    <div className="statusbar">
      <span>9:41</span>
      <span className="icons">
        <span className="material-symbols-rounded">signal_cellular_alt</span>
        <span className="material-symbols-rounded">wifi</span>
        <span className="material-symbols-rounded">battery_full</span>
      </span>
    </div>
  );
}

function App() {
  const [theme, setTheme] = React.useState('light');
  const [icons, setIcons] = React.useState('hugeicons');
  React.useEffect(() => {
    if (!window.IconSwap) return;
    if (icons === 'hugeicons') window.IconSwap.enable(); else window.IconSwap.disable();
  }, [icons]);
  const [tab, setTab] = React.useState('dashboard');
  const [overlay, setOverlay] = React.useState(null);   // pushed screen over a tab (back arrow)
  const [full, setFull] = React.useState(null);         // full-screen flow: onboarding | restore | sync*
  const [sheet, setSheet] = React.useState(false);
  const [passSheet, setPassSheet] = React.useState(null); // 'set' | 'verify'
  const [autoPeriod, setAutoPeriod] = React.useState('Weekly');
  const [periodSheet, setPeriodSheet] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [tab, overlay]);

  const openAdd = () => setSheet(true);
  const go = (o) => setOverlay(o);
  const dark = theme === 'dark';

  const tabScreens = {
    dashboard: <window.HisabakDashboard />,
    transactions: <window.HisabakTransactions onAdd={openAdd} />,
    sms: <window.HisabakSms />,
    manage: <window.HisabakManage onEditBrand={() => go('brandEdit')} onEditCategory={() => go('categoryEdit')} onAdd={() => go('categoryEdit')} />,
    settings: <window.HisabakSettings theme={theme === 'dark' ? 'dark' : theme} onTheme={(t) => setTheme(t === 'dark' ? 'dark' : 'light')} onOpenBackup={() => go('backup')} showReminder={true} onCheckPassphrase={() => setPassSheet('verify')} />,
  };
  const overlayScreens = {
    backup: <window.HisabakBackup onBackupNow={() => setFull({ flow: 'sync', kind: 'backup', phase: 'running' })} onOpenPassphrase={() => setPassSheet('set')} period={autoPeriod} onOpenPeriod={() => setPeriodSheet(true)} />,
    notifications: <window.HisabakNotifications />,
    brandEdit: <window.HisabakBrandEdit />,
    categoryEdit: <window.HisabakCategoryEdit />,
  };

  // Full-screen flows preview from the toolbar; sync auto-advances running → done.
  React.useEffect(() => {
    if (full && full.flow === 'sync' && full.phase === 'running') {
      const t = setTimeout(() => setFull(f => (f ? { ...f, phase: 'done' } : null)), 2200);
      return () => clearTimeout(t);
    }
  }, [full]);

  const showFab = !overlay && (tab === 'dashboard' || tab === 'sms');
  const inOverlay = overlay != null;

  return (
    <div className="stage">
      <div className="toolbar">
        <button className={!dark ? 'on' : ''} onClick={() => setTheme('light')}><span className="material-symbols-rounded" style={{ fontSize: 16 }}>light_mode</span>Light</button>
        <button className={dark ? 'on' : ''} onClick={() => setTheme('dark')}><span className="material-symbols-rounded" style={{ fontSize: 16 }}>dark_mode</span>Dark</button>
        <span className="sep" />
        <button className={icons === 'material' ? 'on' : ''} onClick={() => setIcons('material')}>Material</button>
        <button className={icons === 'hugeicons' ? 'on' : ''} onClick={() => setIcons('hugeicons')}>Hugeicons</button>
        <span className="sep" />
        <button onClick={() => setFull({ flow: 'onboarding' })}>Onboarding</button>
        <button onClick={() => setFull({ flow: 'restore' })}>Restore</button>
        <button onClick={() => setFull({ flow: 'sync', kind: 'restore', phase: 'running' })}>Sync</button>
      </div>

      <div className="phone" data-theme={dark ? 'dark' : undefined}>
        <div className="app">
          <StatusBar />
          {inOverlay
            ? <TopAppBar title={OVERLAY_TITLES[overlay]} onBack={() => setOverlay(null)} />
            : <TopAppBar brand showBell onBell={() => go('notifications')} />}

          <div className="scroll" ref={scrollRef}>
            {inOverlay ? overlayScreens[overlay] : tabScreens[tab]}
          </div>

          {showFab && <button className="fab" onClick={openAdd} aria-label="Add transaction"><span className="material-symbols-rounded">add</span></button>}
          {!inOverlay && <BottomNav tabs={TABS} value={tab} onChange={setTab} />}
          <window.HisabakAddSheet open={sheet} onClose={() => setSheet(false)} />
          <window.HisabakPassphraseSheet open={passSheet === 'set'} onClose={() => setPassSheet(null)} onSave={() => setPassSheet(null)} />
          <window.HisabakPassphraseVerifySheet open={passSheet === 'verify'} onClose={() => setPassSheet(null)} onChangePassphrase={() => { go('backup'); setPassSheet('set'); }} />
          <window.HisabakPeriodSheet open={periodSheet} selected={autoPeriod} onSelect={(p) => { setAutoPeriod(p); setPeriodSheet(false); }} onClose={() => setPeriodSheet(false)} />


          {full && full.flow === 'onboarding' && <window.HisabakOnboarding onFinish={() => setFull(null)} />}
          {full && full.flow === 'restore' && <window.HisabakRestore onConnect={() => setFull({ flow: 'sync', kind: 'restore', phase: 'running' })} onSkip={() => setFull(null)} />}
          {full && full.flow === 'sync' && <window.HisabakSync kind={full.kind} phase={full.phase}
            onContinue={() => setFull(null)} onRetry={() => setFull({ ...full, phase: 'running' })} onClose={() => setFull(null)} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
