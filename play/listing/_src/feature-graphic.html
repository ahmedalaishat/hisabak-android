<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:1024px;height:500px;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{width:1024px;height:500px;background:linear-gradient(135deg,#0E8A66 0%,#0B7A5B 60%,#096b50 100%);
    display:flex;align-items:center;gap:48px;padding:0 72px;box-sizing:border-box;color:#fff;position:relative;overflow:hidden}
  .tile{width:140px;height:140px;border-radius:34px;background:rgba(255,255,255,0.12);
    display:grid;place-items:center;flex:0 0 auto;box-shadow:0 12px 40px rgba(0,0,0,0.18)}
  h1{font-size:72px;margin:0 0 12px;font-weight:800;letter-spacing:-1px}
  p{font-size:30px;margin:0;opacity:.92;font-weight:500;line-height:1.3}
  .glow{position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(149,212,187,0.35),transparent)}
</style></head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <div class="tile">
      <svg width="96" height="96" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M44 122 L78 90 L102 106 L148 60" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"></path>
        <circle cx="148" cy="60" r="13" fill="#95D4BB"></circle>
      </svg>
    </div>
    <div>
      <h1>Hisabak</h1>
      <p>Track spending, set budgets, stay private —<br>your money, organized. All on your device.</p>
    </div>
  </div>
</body></html>
